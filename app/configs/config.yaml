server:
  port: 3000
  host: "0.0.0.0"

providers:
  - id: "qwen"
    name: "通义千问"
    baseUrl: "https://dashscope.aliyuncs.com/compatible-mode/v1"
    apiKey: "${DASHSCOPE_API_KEY}"
    models: "${QWEN_MODELS}"
    maxTokens: 8192
    contextWindow: 131072

modelRouting:
  commands:
    "/analyze": "qwen/qwen-long"
  sceneModels:
    work: "qwen/qwen3.5-plus"
    life: "qwen/qwen3.5-flash"

channels:
  feishu:
    appId: "${FEISHU_APP_ID}"
    appSecret: "${FEISHU_APP_SECRET}"

session:
  maxHistoryTokens: 32000
  ttlHours: 24
  memory:
    compressThreshold: 16
    recentKeep: 6
    maxSummaryLength: 800
    summaryModel: "${SUMMARY_MODEL}"
    extractCooldownMinutes: 120
    extractSimilarityThreshold: 0.85

tools:
  webFetch:
    timeoutMs: 15000
    maxBodySizeKB: 512
  httpApi:
    timeoutMs: 30000
    allowedDomains: []
  jsRender:
    enabled: false
    maxConcurrent: 1
  filterModel: "${FILTER_MODEL}"

rateLimit:
  maxPerMinutePerUser: 10
  maxConcurrentGlobal: 5
