services:
  froadclaw:
    build: ./app
    image: froad-claw:v1
    container_name: froad-claw
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env.prod
    environment:
      - NODE_ENV=production
      - DB_PATH=/app/data/froadclaw.db
      - LOG_DIR=/app/logs
      - TZ=Asia/Shanghai
    volumes:
      # 数据库持久化
      - /opt/workspace/froad-claw/db_volume:/app/data
      # 日志持久化
      - /opt/workspace/froad-claw/log_volume:/app/logs
      # 配置文件（只读）
      - ./app/configs:/app/configs:ro
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
